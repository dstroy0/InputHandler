name: Generate changelog

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - "Build Tool Binaries (Latest)"
      - "Build Tool Binaries (release)"
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          filter: blob:none
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-auto-changelog-${{ hashFiles('library.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-auto-changelog-
            ${{ runner.os }}-npm-

      - name: Configuration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g auto-changelog
          git config user.name "dstroy0"
          git config user.email "dstroy0@users.noreply.github.com"
          ln -s library.json package.json

      - name: Generate changelog
        run: |
          git pull --rebase origin main
          npx auto-changelog --output CHANGELOG.md --commit-limit false --unreleased-only false --template keepachangelog

      - name: Commit changelog update (push event)
        if: github.event_name == 'push'
        run: |
          rm package.json
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md"
          git push origin HEAD:main

      - name: Bump version, commit, and tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags --prune --force
          version=$(npm version patch --no-git-tag-version)
          clean_version=$(echo "$version" | sed 's/^v//')
          sed -i "s/^version=.*$/version=$clean_version/" library.properties
          rm package.json
          git add CHANGELOG.md library.json library.properties
          git commit -m "docs: update changelog for version $version"
          git tag -a "$version" -m "patch"
          git push origin HEAD:main
          git push origin "$version"

  generate-changelog-success:
    runs-on: ubuntu-latest
    name: generate-changelog-success
    needs: [changelog]
    steps:
      - name: echo
        run: echo "generate CHANGELOG.md success!"
